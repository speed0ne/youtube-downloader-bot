services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"

  yt-bot:
    build: .
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      LOCAL_API_URL: http://telegram-bot-api:8081
    depends_on:
      - telegram-bot-api
    restart: unless-stopped

volumes:
  bot-api-data:
